networks:
  default:
    name: neox_network
    ipam:
      config:
        - subnet: 172.200.0.0/24
          gateway: 172.200.0.254

services:
  bootnode:
    image: neox_node
    container_name: bootnode
    env_file:
      - .env
    build:
      context: ../
      dockerfile: ./Dockerfile.alltools
    command: "bootnode -nodekey ${SINGLE_DIR}/bootnode/bootnode.key -addr :30304 -verbosity 5"
    volumes:
      - ../privnet:/privnet
    ports:
      - 30304:30304
    networks:
      default:
        ipv4_address: 172.200.0.1
  miner0:
    image: neox_node
    container_name: miner0
    env_file:
      - .env
    networks:
      default:
        ipv4_address: 172.200.0.2
    command:
      - sh
      - -c
      - |
        geth init --datadir ${SINGLE_NODE0_DIR} ${SINGLE_DIR}/genesis_privnet.json
        geth --datadir ${SINGLE_NODE0_DIR} \
        --port 30305 \
        --bootnodes "enode://$$(cat ${SINGLE_DIR}/bootnode/bootnode_address.txt)@172.200.0.1:0?discport=30304" \
        --networkid "$$(cat ${SINGLE_DIR}/networkid.txt)" \
        --unlock 0x"$$(cat ${SINGLE_NODE0_DIR}/node_address.txt)" \
        --authrpc.port 8551 \
        --http \
        --http.port 8561 \
        --http.addr 0.0.0.0 \
        --http.vhosts "*" \
        --ws \
        --ws.addr 0.0.0.0 \
        --ws.port 8571 \
        --allow-insecure-unlock \
        --password ${SINGLE_NODE0_DIR}/password.txt \
        --metrics \
        --nat extip:172.200.0.2 \
        --netrestrict 172.200.0.0/24 \
        --dbft.loglevel debug \
        --mine \
        --miner.pending.feeRecipient="0x$$(cat ${SINGLE_NODE0_DIR}/node_address.txt)" \
        --antimev.password=${SINGLE_NODE0_DIR}/password.txt
    volumes:
      - ../privnet:/privnet
    ports:
      - 30305:30305
      - 8551:8551
      - 8561:8561
      - 8571:8571
    depends_on:
      - bootnode
  miner1:
    image: neox_node
    container_name: miner1
    env_file:
      - .env
    networks:
      default:
        ipv4_address: 172.200.0.3
    command:
      - sh
      - -c
      - |
        geth init --datadir ${SINGLE_NODE1_DIR} ${SINGLE_DIR}/genesis_privnet.json
        geth --datadir ${SINGLE_NODE1_DIR} \
        --port 30306 \
        --bootnodes "enode://$$(cat ${SINGLE_DIR}/bootnode/bootnode_address.txt)@172.200.0.1:0?discport=30304" \
        --networkid "$$(cat ${SINGLE_DIR}/networkid.txt)" \
        --unlock 0x"$$(cat ${SINGLE_NODE1_DIR}/node_address.txt)" \
        --authrpc.port 8552 \
        --http \
        --http.port 8562 \
        --http.addr 0.0.0.0 \
        --http.vhosts "*" \
        --ws \
        --ws.addr 0.0.0.0 \
        --ws.port 8572 \
        --allow-insecure-unlock \
        --password ${SINGLE_NODE1_DIR}/password.txt \
        --metrics \
        --nat extip:172.200.0.3 \
        --netrestrict 172.200.0.0/24 \
        --dbft.loglevel debug \
        --mine \
        --miner.pending.feeRecipient="0x$$(cat ${SINGLE_NODE1_DIR}/node_address.txt)" \
        --antimev.password=${SINGLE_NODE1_DIR}/password.txt
    volumes:
      - ../privnet:/privnet
    ports:
      - 30306:30306
      - 8552:8552
      - 8562:8562
      - 8572:8572
    depends_on:
      - bootnode
  node0:
    image: neox_node
    container_name: node0
    env_file:
      - .env
    networks:
      default:
        ipv4_address: 172.200.0.4
    command:
      - sh
      - -c
      - |
        geth init --datadir ${SINGLE_NODE2_DIR} ${SINGLE_DIR}/genesis_privnet.json
        geth --datadir ${SINGLE_NODE2_DIR} \
        --port 30307 \
        --bootnodes "enode://$$(cat ${SINGLE_DIR}/bootnode/bootnode_address.txt)@172.200.0.1:0?discport=30304" \
        --networkid "$$(cat ${SINGLE_DIR}/networkid.txt)" \
        --unlock 0x"$$(cat ${SINGLE_NODE2_DIR}/node_address.txt)" \
        --authrpc.port 8553 \
        --http \
        --http.port 8563 \
        --http.addr 0.0.0.0 \
        --http.vhosts "*" \
        --ws \
        --ws.addr 0.0.0.0 \
        --ws.port 8573 \
        --allow-insecure-unlock \
        --password ${SINGLE_NODE2_DIR}/password.txt \
        --metrics \
        --nat extip:172.200.0.4 \
        --netrestrict 172.200.0.0/24 \
        --dbft.loglevel debug
    volumes:
      - ../privnet:/privnet
    ports:
      - 30307:30307
      - 8553:8553
      - 8563:8563
      - 8573:8573
    depends_on:
      - bootnode
